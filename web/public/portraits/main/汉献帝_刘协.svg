<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <!-- 背景: 朱红宣纸 -->
    <linearGradient id="bg-han" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d1f1f"/>
      <stop offset="50%" stop-color="#2a1414"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <!-- 边框: 古金 -->
    <linearGradient id="border-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a7034"/>
      <stop offset="50%" stop-color="#e8c86d"/>
      <stop offset="100%" stop-color="#8a7034"/>
    </linearGradient>
    <!-- 冕冠黑 -->
    <linearGradient id="crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- 服装朱红 -->
    <linearGradient id="robe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#5a1111"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="300" height="400" fill="url(#bg-han)"/>
  <!-- 边框 -->
  <rect x="6" y="6" width="288" height="388" fill="none" stroke="url(#border-gold)" stroke-width="2"/>
  <rect x="12" y="12" width="276" height="376" fill="none" stroke="#8a7034" stroke-width="0.5"/>

  <!-- 4 角云纹装饰 (左上) -->
  <g fill="#c9a84c" opacity="0.6">
    <path d="M 20 20 Q 30 15, 35 20 Q 30 25, 25 22 Q 22 25, 20 20 Z"/>
    <path d="M 20 35 Q 25 30, 30 35 Q 25 40, 22 37 Z"/>
  </g>
  <!-- 右上 -->
  <g fill="#c9a84c" opacity="0.6" transform="translate(300 0) scale(-1 1)">
    <path d="M 20 20 Q 30 15, 35 20 Q 30 25, 25 22 Q 22 25, 20 20 Z"/>
    <path d="M 20 35 Q 25 30, 30 35 Q 25 40, 22 37 Z"/>
  </g>
  <!-- 左下 -->
  <g fill="#c9a84c" opacity="0.6" transform="translate(0 400) scale(1 -1)">
    <path d="M 20 20 Q 30 15, 35 20 Q 30 25, 25 22 Q 22 25, 20 20 Z"/>
    <path d="M 20 35 Q 25 30, 30 35 Q 25 40, 22 37 Z"/>
  </g>
  <!-- 右下 -->
  <g fill="#c9a84c" opacity="0.6" transform="translate(300 400) scale(-1 -1)">
    <path d="M 20 20 Q 30 15, 35 20 Q 30 25, 25 22 Q 22 25, 20 20 Z"/>
    <path d="M 20 35 Q 25 30, 30 35 Q 25 40, 22 37 Z"/>
  </g>

  <!-- ====== 人物立绘 (工笔风) ====== -->
  <g transform="translate(150 100)">
    <!-- 冕冠 (汉代帝王) -->
    <ellipse cx="0" cy="-30" rx="55" ry="12" fill="url(#crown)"/>
    <rect x="-50" y="-40" width="100" height="20" fill="url(#crown)" rx="2"/>
    <!-- 冕旒 (12 串珠) -->
    <g fill="#e8c86d">
      <line x1="-45" y1="-20" x2="-50" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="-50" cy="2" r="2.5" fill="#e8c86d"/>
      <line x1="-30" y1="-20" x2="-35" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="-35" cy="2" r="2.5" fill="#e8c86d"/>
      <line x1="-15" y1="-20" x2="-20" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="-20" cy="2" r="2.5" fill="#e8c86d"/>
      <line x1="0" y1="-20" x2="0" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="0" cy="2" r="2.5" fill="#e8c86d"/>
      <line x1="15" y1="-20" x2="20" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="20" cy="2" r="2.5" fill="#e8c86d"/>
      <line x1="30" y1="-20" x2="35" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="35" cy="2" r="2.5" fill="#e8c86d"/>
      <line x1="45" y1="-20" x2="50" y2="0" stroke="#8a7034" stroke-width="1"/>
      <circle cx="50" cy="2" r="2.5" fill="#e8c86d"/>
    </g>

    <!-- 脸 (工笔) -->
    <ellipse cx="0" cy="20" rx="38" ry="48" fill="#f4e4c1" stroke="#8a6e4a" stroke-width="1"/>
    <!-- 脸阴影 -->
    <ellipse cx="0" cy="40" rx="35" ry="20" fill="#e8d4a8" opacity="0.5"/>
    <!-- 眉 -->
    <path d="M -20 5 Q -15 0, -10 5" stroke="#3a2818" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 10 5 Q 15 0, 20 5" stroke="#3a2818" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- 眼 -->
    <ellipse cx="-12" cy="14" rx="3" ry="4" fill="#1a1a1a"/>
    <ellipse cx="12" cy="14" rx="3" ry="4" fill="#1a1a1a"/>
    <circle cx="-12" cy="13" r="0.8" fill="#fff"/>
    <circle cx="12" cy="13" r="0.8" fill="#fff"/>
    <!-- 鼻 -->
    <path d="M 0 18 L -2 28 L 0 30 L 2 28 Z" fill="#d4b888"/>
    <!-- 唇 (帝王朱砂) -->
    <path d="M -8 36 Q 0 38, 8 36 Q 5 40, 0 40 Q -5 40, -8 36 Z" fill="#8b3a3a"/>
    <!-- 下巴 -->
    <path d="M -3 48 Q 0 52, 3 48" fill="#d4b888"/>

    <!-- 龙衮 (胸前 12 章纹简化) -->
    <g transform="translate(0 100)">
      <ellipse cx="0" cy="0" rx="70" ry="80" fill="url(#robe)"/>
      <!-- 章纹 - 日月星辰 (简) -->
      <circle cx="-30" cy="-20" r="6" fill="#e8c86d" opacity="0.8"/>
      <circle cx="30" cy="-20" r="6" fill="#e8c86d" opacity="0.8"/>
      <path d="M 0 -10 L 3 0 L 0 5 L -3 0 Z" fill="#e8c86d" opacity="0.8"/>
      <!-- 边缘金线 -->
      <path d="M -70 -30 Q 0 -50, 70 -30" stroke="#e8c86d" stroke-width="1.5" fill="none"/>
      <path d="M -70 30 Q 0 50, 70 30" stroke="#e8c86d" stroke-width="1.5" fill="none"/>
    </g>
  </g>

  <!-- 名字 (古风书法感) -->
  <text x="150" y="350" font-family="serif" font-size="28" fill="#e8c86d" text-anchor="middle" font-weight="bold" letter-spacing="6">汉献帝</text>
  <text x="150" y="378" font-family="serif" font-size="14" fill="#8a7034" text-anchor="middle" letter-spacing="3">刘 协</text>
</svg>
