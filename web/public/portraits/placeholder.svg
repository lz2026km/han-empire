<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f12"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#e8c86d"/>
      <stop offset="100%" style="stop-color:#8a7034"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="8"/>
  <rect x="4" y="4" width="192" height="192" fill="none" stroke="url(#border)" stroke-width="2" rx="6"/>
  <text x="100" y="95" font-family="serif" font-size="72" fill="#c9a84c" text-anchor="middle">{{NAME}}</text>
  <text x="100" y="145" font-family="serif" font-size="16" fill="#8a7034" text-anchor="middle">{{TITLE}}</text>
</svg>