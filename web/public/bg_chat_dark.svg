<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0506"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- 古木立柱 × 6 -->
  <g fill="#3a1a0a">
    <rect x="200" y="0" width="40" height="1080"/>
    <rect x="500" y="0" width="40" height="1080"/>
    <rect x="800" y="0" width="40" height="1080"/>
    <rect x="1100" y="0" width="40" height="1080"/>
    <rect x="1400" y="0" width="40" height="1080"/>
    <rect x="1700" y="0" width="40" height="1080"/>
  </g>
  <!-- 柱头莲花 -->
  <g fill="#7a5a1a">
    <circle cx="220" cy="100" r="20"/>
    <circle cx="520" cy="100" r="20"/>
    <circle cx="820" cy="100" r="20"/>
    <circle cx="1120" cy="100" r="20"/>
    <circle cx="1420" cy="100" r="20"/>
    <circle cx="1720" cy="100" r="20"/>
  </g>
  <!-- 朱红横梁 -->
  <rect x="0" y="200" width="1920" height="40" fill="#8b1a1a" opacity="0.6"/>
  <!-- 青铜礼器（鼎） -->
  <g fill="#3a4a3a">
    <rect x="850" y="600" width="120" height="100"/>
    <rect x="830" y="580" width="160" height="30"/>
    <ellipse cx="910" cy="600" rx="80" ry="10"/>
  </g>
  <!-- 竹简奏章堆 -->
  <g fill="#d8c890">
    <rect x="400" y="800" width="100" height="20" rx="2"/>
    <rect x="420" y="780" width="80" height="20" rx="2"/>
    <rect x="1400" y="800" width="100" height="20" rx="2"/>
    <rect x="1420" y="780" width="80" height="20" rx="2"/>
  </g>
  <text x="50%" y="50%" font-family="serif" font-size="48" fill="#d4a548" opacity="0.15" text-anchor="middle">朝堂议事</text>
</svg>